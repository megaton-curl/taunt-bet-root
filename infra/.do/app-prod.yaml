name: taunt-bet
region: fra
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
features:
  - buildpack-stack=ubuntu-22
domains:
  - domain: ${PROD_PRIMARY_DOMAIN}
    type: PRIMARY
    zone: ${PROD_PRIMARY_DOMAIN}
  - domain: ${PROD_WAITLIST_DOMAIN}
    type: ALIAS
    zone: ${PROD_PRIMARY_DOMAIN}
  - domain: ${PROD_API_DOMAIN}
    type: ALIAS
    zone: ${PROD_PRIMARY_DOMAIN}
  - domain: ${PROD_CHAT_DOMAIN}
    type: ALIAS
    zone: ${PROD_PRIMARY_DOMAIN}
ingress:
  rules:
    - component:
        name: backend
        preserve_path_prefix: true
      match:
        authority:
          exact: ${PROD_API_DOMAIN}
        path:
          prefix: /
    - component:
        name: waitlist
        preserve_path_prefix: true
      match:
        authority:
          exact: ${PROD_WAITLIST_DOMAIN}
        path:
          prefix: /
    - component:
        name: webapp
        preserve_path_prefix: true
      match:
        authority:
          exact: ${PROD_PRIMARY_DOMAIN}
        path:
          prefix: /
    - component:
        name: chat
        preserve_path_prefix: true
      match:
        authority:
          exact: ${PROD_CHAT_DOMAIN}
        path:
          prefix: /chat
    - component:
        name: telegram
        preserve_path_prefix: true
      match:
        authority:
          exact: ${PROD_API_DOMAIN}
        path:
          prefix: /wg/tg
services:
  - name: backend
    environment_slug: node-js
    github:
      repo: taunt-bet/backend
      branch: main
      deploy_on_push: false
    source_dir: /
    run_command: pnpm --filter @taunt-bet/backend exec tsx src/index.ts
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    envs:
      - key: RPC_URL
        scope: RUN_AND_BUILD_TIME
        value: ${BACKEND_RPC_URL}
      - key: SERVER_KEYPAIR
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${BACKEND_SERVER_KEYPAIR}
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: ${BACKEND_DATABASE_URL}
      - key: ADMIN_TOKEN
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${BACKEND_ADMIN_TOKEN}
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
        value: ${BACKEND_JWT_SECRET}
      - key: CHAT_FEED_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: ${CHAT_FEED_TOKEN}
      - key: TELEGRAM_BOT_USERNAME
        scope: RUN_TIME
        value: ${TELEGRAM_BOT_USERNAME}
      - key: TELEGRAM_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
        value: ${TELEGRAM_WEBHOOK_SECRET}
      - key: COMMUNITY_INVITE_URL
        scope: RUN_TIME
        value: ${COMMUNITY_INVITE_URL}
  - name: chat
    environment_slug: node-js
    github:
      repo: taunt-bet/chat
      branch: main
      deploy_on_push: false
    source_dir: /
    run_command: pnpm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    envs:
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
        value: ${CHAT_JWT_SECRET}
      - key: CHAT_ADMIN_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: ${CHAT_ADMIN_TOKEN}
      - key: PLATFORM_API_BASE_URL
        scope: RUN_TIME
        value: ${PLATFORM_API_BASE_URL}
      - key: CHAT_FEED_TOKEN
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${CHAT_FEED_TOKEN}
  - name: telegram
    environment_slug: node-js
    github:
      repo: taunt-bet/telegram
      branch: main
      deploy_on_push: false
    source_dir: /
    run_command: pnpm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    envs:
      - key: BACKEND_URL
        scope: RUN_AND_BUILD_TIME
        value: ${BACKEND_URL}
      - key: TELEGRAM_BOT_TOKEN
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${TELEGRAM_BOT_TOKEN}
      - key: TELEGRAM_WEBHOOK_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${TELEGRAM_WEBHOOK_SECRET}
      - key: PUBLIC_APP_URL
        scope: RUN_AND_BUILD_TIME
        value: ${PUBLIC_APP_URL}
      - key: COMMUNITY_INVITE_URL
        scope: RUN_AND_BUILD_TIME
        value: ${COMMUNITY_INVITE_URL}
      - key: REFERRAL_PATH_PREFIX
        scope: RUN_AND_BUILD_TIME
        value: ${REFERRAL_PATH_PREFIX}
static_sites:
  - name: waitlist
    environment_slug: node-js
    github:
      repo: taunt-bet/waitlist
      branch: main
      deploy_on_push: false
    source_dir: /
    output_dir: dist
    catchall_document: index.html
    envs:
      - key: NODE_ENV
        scope: BUILD_TIME
        value: production
      - key: VITE_SOLANA_NETWORK
        scope: BUILD_TIME
        value: ${VITE_SOLANA_NETWORK}
      - key: VITE_FAIRNESS_BACKEND_URL
        scope: BUILD_TIME
        value: ${VITE_FAIRNESS_BACKEND_URL}
      - key: VITE_RPC_URL
        scope: BUILD_TIME
        value: ${VITE_RPC_URL}
      - key: VITE_BASE_PATH
        scope: BUILD_TIME
        value: ${VITE_BASE_PATH}
  - name: webapp
    environment_slug: node-js
    github:
      repo: taunt-bet/webapp
      branch: main
      deploy_on_push: false
    source_dir: /
    output_dir: dist
    index_document: index.html
    catchall_document: index.html
    envs:
      - key: NODE_ENV
        scope: BUILD_TIME
        value: production
      - key: VITE_SOLANA_NETWORK
        scope: BUILD_TIME
        value: ${WEBAPP_VITE_SOLANA_NETWORK}
      - key: VITE_FAIRNESS_BACKEND_URL
        scope: BUILD_TIME
        value: ${WEBAPP_VITE_FAIRNESS_BACKEND_URL}
      - key: VITE_RPC_URL
        scope: BUILD_TIME
        value: ${WEBAPP_VITE_RPC_URL}
      - key: VITE_WS_RPC_URL
        scope: BUILD_TIME
        value: ${WEBAPP_VITE_WS_RPC_URL}
