name: dev-taunt-bet-infra
region: fra
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
features:
  - buildpack-stack=ubuntu-22
domains:
  - domain: dev.taunt.bet
    type: PRIMARY
    zone: dev.taunt.bet
  - domain: waitlist.dev.taunt.bet
    type: ALIAS
    zone: dev.taunt.bet
  - domain: api.dev.taunt.bet
    type: ALIAS
    zone: dev.taunt.bet
  - domain: webapp.dev.taunt.bet
    type: ALIAS
    zone: dev.taunt.bet
  - domain: scream.dev.taunt.bet
    type: ALIAS
    zone: dev.taunt.bet
ingress:
  rules:
    - component:
        name: backend
        preserve_path_prefix: true
      match:
        authority:
          exact: api.dev.taunt.bet
        path:
          prefix: /
    - component:
        name: waitlist
        preserve_path_prefix: true
      match:
        authority:
          exact: waitlist.dev.taunt.bet
        path:
          prefix: /
    - component:
        name: webapp
        preserve_path_prefix: true
      match:
        authority:
          exact: dev.taunt.bet
        path:
          prefix: /
    - component:
        name: chat
        preserve_path_prefix: true
      match:
        authority:
          exact: scream.dev.taunt.bet
        path:
          prefix: /chat
    - component:
        name: telegram
        preserve_path_prefix: true
      match:
        authority:
          exact: api.dev.taunt.bet
        path:
          prefix: /wg/tg
services:
  - name: backend
    environment_slug: node-js
    github:
      repo: taunt-bet/backend
      branch: dev
      deploy_on_push: false
    source_dir: /
    run_command: pnpm --filter @taunt-bet/backend exec tsx src/index.ts
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    envs:
      - key: RPC_URL
        scope: RUN_AND_BUILD_TIME
        value: https://lb.drpc.live/solana-devnet/AvfNVeH0_E7ajvkIaZ0OS6QiksDa5ZMR76q4qi5fk9AX
      - key: SERVER_KEYPAIR
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${BACKEND_SERVER_KEYPAIR}
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: ${BACKEND_DATABASE_URL}
      - key: ADMIN_TOKEN
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${BACKEND_ADMIN_TOKEN}
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
        value: ${BACKEND_JWT_SECRET}
      - key: CHAT_FEED_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: ${CHAT_FEED_TOKEN}
      - key: TELEGRAM_BOT_USERNAME
        scope: RUN_TIME
        value: tb_646_dev_bot
      - key: TELEGRAM_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
        value: ${TELEGRAM_WEBHOOK_SECRET}
      - key: COMMUNITY_INVITE_URL
        scope: RUN_TIME
        value: https://t.me/+nK0wON5pcHA5Zjc0
  - name: chat
    environment_slug: node-js
    github:
      repo: taunt-bet/chat
      branch: dev
      deploy_on_push: false
    source_dir: /
    run_command: pnpm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    envs:
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
        value: ${CHAT_JWT_SECRET}
      - key: CHAT_ADMIN_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: ${CHAT_ADMIN_TOKEN}
      - key: PLATFORM_API_BASE_URL
        scope: RUN_TIME
        value: https://api.dev.taunt.bet
      - key: CHAT_FEED_TOKEN
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${CHAT_FEED_TOKEN}
  - name: telegram
    environment_slug: node-js
    github:
      repo: taunt-bet/telegram
      branch: dev
      deploy_on_push: false
    source_dir: /
    run_command: pnpm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    envs:
      - key: BACKEND_URL
        scope: RUN_AND_BUILD_TIME
        value: https://api.dev.taunt.bet
      - key: TELEGRAM_BOT_TOKEN
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${TELEGRAM_BOT_TOKEN}
      - key: TELEGRAM_WEBHOOK_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${TELEGRAM_WEBHOOK_SECRET}
      - key: PUBLIC_APP_URL
        scope: RUN_AND_BUILD_TIME
        value: https://waitlist.dev.taunt.bet
      - key: COMMUNITY_INVITE_URL
        scope: RUN_AND_BUILD_TIME
        value: https://t.me/+nK0wON5pcHA5Zjc0
      - key: REFERRAL_PATH_PREFIX
        scope: RUN_AND_BUILD_TIME
        value: /ref
static_sites:
  - name: waitlist
    environment_slug: node-js
    github:
      repo: taunt-bet/waitlist
      branch: dev
      deploy_on_push: false
    source_dir: /
    output_dir: dist
    catchall_document: index.html
    envs:
      - key: NODE_ENV
        scope: BUILD_TIME
        value: production
      - key: VITE_SOLANA_NETWORK
        scope: BUILD_TIME
        value: devnet
      - key: VITE_FAIRNESS_BACKEND_URL
        scope: BUILD_TIME
        value: https://api.dev.taunt.bet
      - key: VITE_RPC_URL
        scope: BUILD_TIME
        value: https://lb.drpc.live/solana-devnet/AvfNVeH0_E7ajvkIaZ0OS6QiksDa5ZMR76q4qi5fk9AX
      - key: VITE_BASE_PATH
        scope: BUILD_TIME
        value: /
  - name: webapp
    environment_slug: node-js
    github:
      repo: taunt-bet/webapp
      branch: dev
      deploy_on_push: false
    source_dir: /
    output_dir: dist
    index_document: index.html
    catchall_document: index.html
    envs:
      - key: NODE_ENV
        scope: BUILD_TIME
        value: production
      - key: VITE_SOLANA_NETWORK
        scope: BUILD_TIME
        value: devnet
      - key: VITE_FAIRNESS_BACKEND_URL
        scope: BUILD_TIME
        value: https://api.dev.taunt.bet
      - key: VITE_RPC_URL
        scope: BUILD_TIME
        value: https://lb.drpc.live/solana-devnet/AvfNVeH0_E7ajvkIaZ0OS6QiksDa5ZMR76q4qi5fk9AX
      - key: VITE_WS_RPC_URL
        scope: BUILD_TIME
        value: wss://lb.drpc.live/solana-devnet/AvfNVeH0_E7ajvkIaZ0OS6QiksDa5ZMR76q4qi5fk9AX
