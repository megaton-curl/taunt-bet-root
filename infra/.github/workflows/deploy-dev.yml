name: Deploy Dev

on:
  push:
    branches:
      - dev

permissions:
  contents: read

concurrency:
  group: infra-deploy-dev
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate YAML syntax
        run: ruby -e "require 'yaml'; YAML.load_file('.do/app-dev.yaml')"

      - name: Ensure App Platform deploy_on_push is disabled
        run: |
          ! grep "deploy_on_push: true" .do/app-dev.yaml

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy combined dev app
        id: deploy
        uses: digitalocean/app_action/deploy@v2
        env:
          BACKEND_SERVER_KEYPAIR: ${{ secrets.BACKEND_SERVER_KEYPAIR }}
          BACKEND_DATABASE_URL: ${{ secrets.BACKEND_DATABASE_URL }}
          BACKEND_ADMIN_TOKEN: ${{ secrets.BACKEND_ADMIN_TOKEN }}
          BACKEND_JWT_SECRET: ${{ secrets.BACKEND_JWT_SECRET }}
          CHAT_FEED_TOKEN: ${{ secrets.CHAT_FEED_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          CHAT_JWT_SECRET: ${{ secrets.CHAT_JWT_SECRET }}
          CHAT_ADMIN_TOKEN: ${{ secrets.CHAT_ADMIN_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          app_spec_location: .do/app-dev.yaml
          print_build_logs: true
          print_deploy_logs: true

      - name: Write deployment summary
        env:
          APP_JSON: ${{ steps.deploy.outputs.app }}
        run: |
          node -e "const app = JSON.parse(process.env.APP_JSON); console.log('App:', app.spec?.name ?? app.id); console.log('Live URL:', app.live_url ?? 'n/a');" >> "$GITHUB_STEP_SUMMARY"
