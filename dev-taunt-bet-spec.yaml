alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED
databases:
- cluster_name: dev-taunt-db-pg
  engine: PG
  name: dev-taunt-db-pg
  production: true
  version: "18"
domains:
- domain: dev.taunt.bet
  type: PRIMARY
  zone: dev.taunt.bet
- domain: waitlist.dev.taunt.bet
  type: ALIAS
  zone: dev.taunt.bet
- domain: api.dev.taunt.bet
  type: ALIAS
  zone: dev.taunt.bet
- domain: webapp.dev.taunt.bet
  type: ALIAS
  zone: dev.taunt.bet
- domain: scream.dev.taunt.bet
  type: ALIAS
  zone: dev.taunt.bet
features:
- buildpack-stack=ubuntu-22
ingress:
  rules:
  - component:
      name: backend
      preserve_path_prefix: true
    match:
      authority:
        exact: api.dev.taunt.bet
      path:
        prefix: /
  - component:
      name: waitlist
    match:
      authority:
        exact: waitlist.dev.taunt.bet
      path:
        prefix: /
  - component:
      name: webapp
    match:
      authority:
        exact: dev.taunt.bet
      path:
        prefix: /
  - component:
      name: chat
      preserve_path_prefix: true
    match:
      authority:
        exact: scream.dev.taunt.bet
      path:
        prefix: /chat
  - component:
      name: telegram
    match:
      authority:
        exact: api.dev.taunt.bet
      path:
        prefix: /wg/tg
name: dev-taunt-bet
region: fra
